<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RecToom - Download</title>
    <style>
        body {
            background-color: #000;
            color: #00ff66;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
        }
        header {
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            border-bottom: 2px solid #00ff66;
        }
        .lang-switch {
            margin-top: 10px;
        }
        .lang-btn {
            background-color: #00ff66;
            color: #000;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 16px;
            text-decoration: none;
            margin: 5px;
            display: inline-block;
            font-weight: bold;
            cursor: pointer;
        }
        .content {
            padding: 60px 20px;
        }
        h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }
        p {
            font-size: 22px;
            margin-bottom: 40px;
        }
        .btn {
            background-color: #00ff66;
            color: #000;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 20px;
            text-decoration: none;
            margin: 10px;
            display: inline-block;
            font-weight: bold;
            cursor: pointer;
        }
        footer {
            margin-top: 80px;
            padding: 20px;
            font-size: 14px;
            opacity: 0.7;
            border-top: 2px solid #00ff66;
        }
    </style>
</head>
<body>

<header>
    RecToom — Download
    <div class="lang-switch">
        <span class="lang-btn" onclick="setLang('en')">English</span>
        <span class="lang-btn" onclick="setLang('fr')">Français</span>
    </div>
</header>

<div class="content">
    <h1 id="title">Download RecToom</h1>
    <p id="subtitle">Choose your device below.</p>

    <a class="btn" onclick="notReleased()" id="pcBtn">PC (Windows)</a>
    <a class="btn" onclick="notReleased()" id="androidBtn">Android</a>
    <a class="btn" onclick="notReleased()" id="iosBtn">iOS</a>
    <a class="btn" onclick="notReleased()" id="vrBtn">VR Headsets</a>

    <br><br>
    <a class="btn" id="backBtn" href="index.html">← Back to Home</a>
</div>

<footer id="footer">
    RecToom © 2026 — Powered by Nexora
</footer>

<script>
function notReleased() {
    alert("RecToom is not released yet. Sorry!");
}

function setLang(lang) {
    if (lang === 'fr') {
        document.getElementById("title").innerText = "Télécharger RecToom";
        document.getElementById("subtitle").innerText = "Choisissez votre appareil ci-dessous.";
        document.getElementById("pcBtn").innerText = "PC (Windows)";
        document.getElementById("androidBtn").innerText = "Android";
        document.getElementById("iosBtn").innerText = "iOS";
        document.getElementById("vrBtn").innerText = "Casques VR";
        document.getElementById("backBtn").innerText = "← Retour à l'accueil";
        document.getElementById("footer").innerText = "RecToom © 2026 — Propulsé par Nexora";
    } else {
        document.getElementById("title").innerText = "Download RecToom";
        document.getElementById("subtitle").innerText = "Choose your device below.";
        document.getElementById("pcBtn").innerText = "PC (Windows)";
        document.getElementById("androidBtn").innerText = "Android";
        document.getElementById("iosBtn").innerText = "iOS";
        document.getElementById("vrBtn").innerText = "VR Headsets";
        document.getElementById("backBtn").innerText = "← Back to Home";
        document.getElementById("footer").innerText = "RecToom © 2026 — Powered by Nexora";
    }
}
</script>

</body>
</html>
