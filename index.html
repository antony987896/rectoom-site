<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RecToom - Home</title>
    <style>
        body {
            background-color: #000;
            color: #00ff66;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
        }
        header {
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            border-bottom: 2px solid #00ff66;
        }

        /* Boutons Se connecter / S'inscrire */
        .auth-buttons {
            margin-top: 10px;
        }
        .auth-btn {
            background-color: #00ff66;
            color: #000;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 16px;
            text-decoration: none;
            margin: 5px;
            display: inline-block;
            font-weight: bold;
        }

        .lang-switch {
            margin-top: 10px;
        }
        .lang-btn {
            background-color: #00ff66;
            color: #000;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 16px;
            text-decoration: none;
            margin: 5px;
            display: inline-block;
            font-weight: bold;
            cursor: pointer;
        }
        .hero {
            padding: 80px 20px;
        }
        .hero h1 {
            font-size: 60px;
            margin-bottom: 10px;
        }
        .hero p {
            font-size: 22px;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #00ff66;
            color: #000;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 20px;
            text-decoration: none;
            margin: 10px;
            display: inline-block;
            font-weight: bold;
        }
        footer {
            margin-top: 80px;
            padding: 20px;
            font-size: 14px;
            opacity: 0.7;
            border-top: 2px solid #00ff66;
        }
    </style>
</head>
<body>

<header>
    RecToom

    <!-- Boutons Se connecter / S'inscrire -->
    <div class="auth-buttons">
        <a class="auth-btn" id="loginBtn" href="login.html">Se connecter</a>
        <a class="auth-btn" id="registerBtn" href="register.html">S'inscrire</a>
    </div>

    <div class="lang-switch">
        <span class="lang-btn" onclick="setLang('en')">English</span>
        <span class="lang-btn" onclick="setLang('fr')">Français</span>
    </div>
</header>

<div class="hero">
    <h1 id="title">Welcome to RecToom</h1>
    <p id="subtitle">A new generation of social gaming.</p>

    <a class="btn" id="enterBtn" href="download.html">Enter RecToom</a>
    <a class="btn" id="discordBtn" href="https://discord.gg/eWxJncTr2j" target="_blank">Join The Discord</a>
    <a class="btn" id="aboutBtn" href="about.html">About</a>
</div>

<footer id="footer">
    RecToom © 2026 — Powered by Nexora
</footer>

<script>
function setLang(lang) {
    if (lang === 'fr') {
        document.getElementById("title").innerText = "Bienvenue sur RecToom";
        document.getElementById("subtitle").innerText = "Une nouvelle génération de jeu social.";
        document.getElementById("enterBtn").innerText = "Entrer dans RecToom";
        document.getElementById("discordBtn").innerText = "Rejoindre Le Discord";
        document.getElementById("aboutBtn").innerText = "À propos";
        document.getElementById("footer").innerText = "RecToom © 2026 — Propulsé par Nexora";

        // Traduction des boutons de connexion
        document.getElementById("loginBtn").innerText = "Se connecter";
        document.getElementById("registerBtn").innerText = "S'inscrire";

    } else {
        document.getElementById("title").innerText = "Welcome to RecToom";
        document.getElementById("subtitle").innerText = "A new generation of social gaming.";
        document.getElementById("enterBtn").innerText = "Enter RecToom";
        document.getElementById("discordBtn").innerText = "Join The Discord";
        document.getElementById("aboutBtn").innerText = "About";
        document.getElementById("footer").innerText = "RecToom © 2026 — Powered by Nexora";

        // Traduction des boutons de connexion
        document.getElementById("loginBtn").innerText = "Login";
        document.getElementById("registerBtn").innerText = "Register";
    }
}
</script>

</body>
</html>
